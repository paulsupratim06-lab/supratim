<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resourcely - Learning Platform</title>
    <!-- Modern Sans-Serif Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sky-background"></div>
    <div class="page-wrapper">
        <div class="top-search-wrapper">
            <div class="top-search">
                <i class="fa-solid fa-magnifying-glass search-icon-top"></i>
                <input type="text" placeholder="Search Something">
            </div>
        </div>

        <div class="app-container">
            <header class="main-header">
                <div class="logo">Resourcely</div>
                <nav class="main-nav">
                    <a href="#">Home</a>
                    <a href="#">Categories</a>
                    <a href="#">About</a>
                    <a href="#">Contact Us</a>
                    <a href="#">Blogs</a>
                </nav>
                <div class="header-actions">
                    <button class="icon-btn search-icon" aria-label="Search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <button class="btn-primary" style="padding: 10px 20px;">Get Started</button>
                </div>
            </header>

            <main>
                <section class="hero-section">
                    <div class="hero-text">
                        <h1>India's #1<br>Learning Platform</h1>
                        <p>Free Online Access<br>to NCERT textbooks & more</p>
                        <div class="hero-buttons">
                            <button class="btn-primary">Get Access</button>
                            <button class="btn-primary">Login</button>
                        </div>
                    </div>
                    <div class="hero-image">
                        <img src="images/hero-illustration.png" alt="Student learning illustration">
                    </div>
                </section>

                <section class="bottom-section">
                    <div class="categories-label-box">
                        <span class="vertical-text">Categories</span>
                    </div>
                    <div class="categories-grid">
                        <a href="maths.html" class="category-card interactive card-maths" style="text-decoration: none; color: inherit;">
                            <div class="icon-box math-icon">
                                <div>− <span style="font-size:0.8em">×</span></div>
                                <div>+ =</div>
                            </div>
                            <h3>Maths</h3>
                        </a>
                        <div class="category-card interactive card-chemistry">
                            <div class="icon-box"><i class="fa-solid fa-flask"></i></div>
                            <h3>Chemistry</h3>
                        </div>
                        <div class="category-card interactive card-physics">
                            <div class="icon-box"><i class="fa-solid fa-car-side"></i></div>
                            <h3>Physics</h3>
                        </div>
                        <div class="category-card interactive card-english">
                            <div class="icon-box" style="font-weight: 700; font-family: var(--font-main); font-size: 2rem; letter-spacing: -2px;">Aa</div>
                            <h3>English</h3>
                        </div>
                        <div class="category-card interactive card-biology">
                            <div class="icon-box"><i class="fa-brands fa-reddit-alien" style="font-size: 1.8rem;"></i></div>
                            <h3>Biology</h3>
                        </div>
                        <div class="category-card interactive card-humanities">
                            <div class="icon-box" style="display: flex; gap: 2px;">
                                <i class="fa-solid fa-book" style="transform: scaleX(0.7);"></i>
                                <i class="fa-solid fa-book" style="transform: scaleX(0.7);"></i>
                            </div>
                            <h3>Humanities</h3>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
